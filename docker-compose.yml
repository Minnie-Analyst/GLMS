version: '3.8'

services:

  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glmssql
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  glms-backend-api:
    build:
      context: ./GLMS.API
      dockerfile: Dockerfile
    container_name: glms-api
    ports:
      - "7168:8080"
    depends_on:
      - sql-server-db

  glms-frontend-web:
    build:
      context: ./GLMS
      dockerfile: Dockerfile
    container_name: glms-web
    ports:
      - "8080:8080"
    depends_on:
      - glms-backend-api